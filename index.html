<!DOCTYPE html>
<html lang="ru">
<head>
    <link href="https://googleapis.com" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiaSHi8 | Developer</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        .system-status {
            margin-top: 40px;
            font-family: monospace;
            font-size: 0.7rem;
            color: rgba(157, 78, 221, 0.5); 
            letter-spacing: 1px;
            user-select: none;
            text-transform: uppercase;
            transition: opacity 0.5s ease;
        }

        :root {
            --accent: #9d4edd; 
            --text: #ededed;
            --bg: #0a0a0a;
            --tg-color: #26A5E4; /* Цвет Telegram */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(10, 10, 10, 0.7) 0%, rgba(10, 10, 10, 0.9) 100%);
            z-index: 1;
        }

        #glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 2;
            filter: blur(30px);
        }

        .container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 350px;
            padding: 20px;
            text-align: center;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { 
    font-family: 'JetBrains Mono', monospace; /* Новый крутой шрифт */
    position: relative;
    font-size: 2.5rem; 
    margin: 0; 
    text-shadow: 0 0 20px rgba(157, 78, 221, 0.5); 
    cursor: pointer;
    color: var(--text);
    min-height: 1em; /* Чтобы страница не прыгала при печати */
}


        .subtitle { 
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 0.4s; 
            color: #888; 
            letter-spacing: 2px; 
            margin-bottom: 30px; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
        }

        .links { display: grid; gap: 15px; }

                .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(157, 78, 221, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            display: block; /* Чтобы кнопка была кликабельной по всей площади */
        }

        /* Общий ховер для всех кнопок (фиолетовый по умолчанию) */
        .btn:hover {
            border-color: var(--accent);
            transform: translateY(-5px) scale(1.07) !important; /* !important теперь тут */
            background: rgba(157, 78, 221, 0.2);
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.6);
            color: white;
        }

        /* Синий ховер специально для кнопки ТГ */
        .btn-tg:hover {
            background: rgba(38, 165, 228, 0.2) !important;
            box-shadow: 0 0 25px rgba(38, 165, 228, 0.8) !important;
            border-color: var(--tg-color) !important;
        }


        /* СПЕЦИАЛЬНАЯ КНОПКА ТЕЛЕГРАМ */
        @keyframes tg-pulse {
            0% { box-shadow: 0 0 0 0 rgba(38, 165, 228, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(38, 165, 228, 0); }
            100% { box-shadow: 0 0 0 0 rgba(38, 165, 228, 0); }
        }

        .btn-tg {
            border-color: rgba(38, 165, 228, 0.3) !important;
            animation: fadeInUp 0.8s ease-out forwards, tg-pulse 2s infinite !important;
            animation-delay: 1s, 2s !important; /* Сначала появится, потом начнет пульсировать */
        }

        .btn-tg:hover {
            border-color: var(--tg-color) !important;
            box-shadow: 0 0 25px rgba(38, 165, 228, 0.8) !important;
            background: rgba(38, 165, 228, 0.2) !important;
        }

        * {
            -webkit-user-select: none !important;
            user-select: none !important;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="overlay"></div>
    <div id="glow"></div>

    <div class="container">
        <h1>KiaSHi8</h1>
        <div class="subtitle">C# • PYTHON • KALI LINUX • JAVA • DOCKER • HTML</div>
        <div class="links">
            <a class="btn" style="animation-delay: 0.6s" href="https://github.com/KiaSHi8/Military-Rank-Trainer" target="_blank">Military Trainer</a>
            <a class="btn" style="animation-delay: 0.8s" href="https://github.com/KiaSHi8/Py-Network-Scanner" target="_blank">Network Scanner</a>
            <a class="btn btn-tg" style="animation-delay: 1.0s" href="https://t.me/Osu_Kioshi8" target="_blank">🔷 Telegram Channel</a>
            <div class="system-status" id="status-text">[SYSTEM]: INITIALIZATION...</div>
        </div>
    </div>

    <script>
        // ... твой скрипт остается без изменений ...
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const glow = document.getElementById('glow');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>[]{}/\\|!@#$%^&*()";
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = new Array(columns).fill(0).map(() => Math.random() * canvas.height);
        
        const layers = new Array(columns).fill(0).map(() => ({
            speed: Math.random() * 2 + 1,
            size: Math.random() * 10 + 10
        }));

        function draw() {
            ctx.fillStyle = "rgba(10, 10, 10, 0.1)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                const layer = layers[i];
                ctx.font = layer.size + "px monospace";
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent'); 
                ctx.fillText(text, i * fontSize, drops[i]);

                if (drops[i] > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += fontSize * (layer.speed * 0.4);
            }
        }

        setInterval(draw, 33);

        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Добавим маленькую логику для статуса
        const statusElement = document.getElementById('status-text');
        const statuses = ["[SYSTEM]: ONLINE", "[STATUS]: SCANNING...", "[DATA]: ENCRYPTED", "[USER]: KiaSHi8"];
        setInterval(() => {
            statusElement.innerText = statuses[Math.floor(Math.random() * statuses.length)];
        }, 3000);
        const title = document.querySelector('h1');
const finalName = "KiaSHi8";
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>[]{}/\\|!@#$%^&*()";
let iteration = 0;

const interval = setInterval(() => {
    title.innerText = finalName.split("")
        .map((letter, index) => {
            if(index < iteration) {
                return finalName[index];
            }
            return chars[Math.floor(Math.random() * chars.length)];
        })
        .join("");
    
    if(iteration >= finalName.length) {
        clearInterval(interval);
    }
    
    iteration += 1 / 3; // Скорость появления (чем меньше число, тем медленнее)
}, 30);
        
// --- ФИНАЛЬНАЯ ПАСХАЛКА "HACK" ---
let inputBuffer = "";
let isHacking = false;

window.addEventListener('keydown', (e) => {
    if (isHacking) return; // Игнорируем нажатия, пока идет эффект
    
    inputBuffer += e.key.toLowerCase();
    
    // Держим в буфере только последние 4 символа
    if (inputBuffer.length > 4) {
        inputBuffer = inputBuffer.substring(inputBuffer.length - 4);
    }

    if (inputBuffer === "hack") {
        isHacking = true;
        
        // 1. Активируем КРАСНЫЙ РЕЖИМ
        document.documentElement.style.setProperty('--accent', '#ff0000');
        glow.style.background = "radial-gradient(circle, rgba(255, 0, 0, 0.4) 0%, rgba(0,0,0,0) 70%)";
        
        statusElement.style.color = "#ff0000";
        statusElement.innerText = "[CRITICAL ERROR]: SYSTEM COMPROMISED";

        // 2. Резко ускоряем дождь
        layers.forEach(l => { l.speed *= 8; });

        // 3. ОТКАТ (через 4 секунды возвращаем всё в норму)
        setTimeout(() => {
            // Возвращаем фиолетовый акцент
            document.documentElement.style.setProperty('--accent', '#9d4edd');
            glow.style.background = "radial-gradient(circle, rgba(157, 78, 221, 0.2) 0%, rgba(0,0,0,0) 70%)";
            
            // Восстанавливаем статус
            statusElement.style.color = "rgba(157, 78, 221, 0.5)";
            statusElement.innerText = "[SYSTEM]: RECOVERED";
            
            // Возвращаем нормальную скорость дождя
            layers.forEach(l => { l.speed /= 8; });
            
            // Сбрасываем флаги
            inputBuffer = ""; 
            isHacking = false;
        }, 4000);
    }
});
