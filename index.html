<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiaSHi8 | Developer</title>
    <style>
        :root {
            /* Фиолетовые акценты */
            --accent: #9d4edd; 
            --accent-hover: #c77dff;
            --text: #ededed;
        }

        /*  фон с градиентом, адаптированный под фиолетовый оттенок */
        body { 
            background: radial-gradient(circle, #1a0b2e 0%, #0a0a0a 100%); 
            color: var(--text); 
            text-align: center; 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
            color: var(--text);
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links {
            display: grid;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05); /* Эффект стекла */
            color: var(--text);
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid rgba(157, 78, 221, 0.2); /* Тонкая фиолетовая рамочка */
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: var(--accent);
            transform: scale(1.05);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
        }

        .btn span {
            color: var(--accent);
            margin-right: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KiaSHi8</h1>
        <div class="subtitle">C# • Python • Kali Linux • Java </div>
        
        <div class="links">
            <a class="btn" href="https://github.com" target="_blank"><span>01</span> Military Trainer</a>
            <a class="btn" href="https://github.com" target="_blank"><span>02</span> Network Scanner</a>
            <a class="btn" href="https://t.me" target="_blank"><span>03</span> Telegram</a>
        </div>
    </div>
</body>
</html>
